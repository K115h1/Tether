<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#84CC16" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C5CBF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#0E0B14"/>

  <!-- Animated-looking concentric rings (static representation) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#7C5CBF" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#7C5CBF" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="8 12"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#84CC16" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="12 8"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#F59E0B" stroke-width="1.2" stroke-opacity="0.4"/>
  <circle cx="100" cy="100" r="32" fill="none" stroke="#7C5CBF" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Crosshair lines -->
  <g stroke="#7C5CBF" stroke-width="0.8" stroke-opacity="0.2">
    <line x1="100" y1="10" x2="100" y2="30"/>
    <line x1="100" y1="170" x2="100" y2="190"/>
    <line x1="10" y1="100" x2="30" y2="100"/>
    <line x1="170" y1="100" x2="190" y2="100"/>
  </g>

  <!-- Diagonal crosshair -->
  <g stroke="#7C5CBF" stroke-width="0.6" stroke-opacity="0.15">
    <line x1="35" y1="35" x2="50" y2="50"/>
    <line x1="165" y1="35" x2="150" y2="50"/>
    <line x1="35" y1="165" x2="50" y2="150"/>
    <line x1="165" y1="165" x2="150" y2="150"/>
  </g>

  <!-- Center glow -->
  <circle cx="100" cy="100" r="24" fill="url(#centerGlow)" opacity="0.6"/>

  <!-- Theta container circle -->
  <circle cx="100" cy="100" r="18" fill="#0E0B14" stroke="#84CC16" stroke-width="2" filter="url(#softGlow)"/>

  <!-- Capital Greek Theta -->
  <text x="100" y="105" 
        font-family="'Times New Roman', serif" 
        font-size="22" 
        font-weight="bold" 
        fill="#84CC16" 
        text-anchor="middle" 
        dominant-baseline="middle">Θ</text>

  <!-- Corner markers -->
  <g fill="#F59E0B" opacity="0.6">
    <circle cx="100" cy="48" r="2"/>
    <circle cx="100" cy="152" r="2"/>
    <circle cx="48" cy="100" r="2"/>
    <circle cx="152" cy="100" r="2"/>
  </g>
</svg>